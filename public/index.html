<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="color-scheme" content="light">
<title>Downtown Erie Events Calendar 2026</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f8fa;
  --white:#ffffff;
  --surface:#f1f3f5;
  --border:#e2e5ea;
  --border-light:#eef0f2;
  --header-bg:#1e3a5f;
  --header-dark:#162d4a;
  --accent:#1e3a5f;
  --accent-light:#eef3f8;
  --gold:#D4AF37;
  --gold-light:#c4a030;
  --text:#1a1a2e;
  --text-muted:#6b7280;
  --text-light:#9ca3af;
  --green:#059669;
  --shadow:0 1px 3px rgba(0,0,0,0.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.7}
a{color:inherit;text-decoration:none}
button{font-family:'Inter',sans-serif}

/* === HEADER === */
.header{background:var(--white);border-bottom:1px solid var(--border)}
.header-top{background:var(--header-bg);color:#fff;padding:24px 32px}
.header-inner{max-width:1100px;margin:0 auto}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:24px}
.brand h1{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,30px);font-weight:700;color:#fff;letter-spacing:-0.5px}
.brand p{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px;font-weight:300}
.header-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:10px 16px;text-align:center;line-height:1.4}
.header-badge strong{display:block;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff}
.header-badge span{font-size:11px;color:rgba(255,255,255,0.8);font-weight:400}
#update-badge{display:none;font-size:10px;margin-top:4px;color:rgba(255,255,255,0.6);font-weight:300}

/* === SOURCES BAR === */
.sources-bar{padding:14px 32px;background:var(--white);border-bottom:1px solid var(--border-light);overflow-x:auto;-webkit-overflow-scrolling:touch}
.sources-bar .inner{max-width:1100px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sources-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-light);font-weight:600;margin-right:4px}
.src-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:5px 12px 5px 8px;white-space:nowrap;cursor:pointer;transition:border-color 0.3s, background 0.3s}
.src-pill:hover{border-color:var(--accent);background:var(--accent-light)}
.src-pill.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
.src-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* === FILTERS === */
.filters{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 32px;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.filters-inner{max-width:1100px;margin:0 auto;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;flex-shrink:0}
.filter-opts{display:flex;gap:3px;flex-wrap:wrap}
.fbtn{background:transparent;border:1px solid transparent;color:var(--text-light);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;transition:color 0.3s, background 0.3s, border-color 0.3s}
.fbtn:hover{color:var(--text);background:var(--surface)}
.fbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.fbtn.active{background:var(--accent-light);border-color:#bdd4ec;color:var(--accent);font-weight:600}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px 8px 36px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.3s, box-shadow 0.3s}
.search-wrap input::placeholder{color:var(--text-light)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,58,95,0.1)}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-light)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.vbtn{background:var(--white);border:none;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text-light);transition:background 0.3s, color 0.3s}
.vbtn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.vbtn.active{background:var(--accent);color:#fff;font-weight:600}
.vbtn:not(:last-child){border-right:1px solid var(--border)}

/* === CONTENT === */
.content{max-width:1100px;margin:0 auto;padding:24px 32px 60px}

/* === UP NEXT === */
.upnext{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:18px 22px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;transition:border-color 0.3s}
.upnext:hover{border-color:#6ee7b7}
.upnext-badge{background:var(--green);color:#fff;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.upnext-info{flex:1;min-width:200px}
.upnext-info h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text)}
.upnext-info p{font-size:12px;color:var(--text-muted);margin-top:3px}
.upnext-countdown{font-size:13px;font-weight:600;color:var(--green);background:#fff;border:1px solid #a7f3d0;padding:6px 16px;border-radius:100px}

/* === MONTH SECTIONS === */
.month-section{margin-bottom:32px}
.month-header{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--text)}
.month-header h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--text)}
.month-count{font-size:12px;font-weight:500;color:var(--text-light)}

/* === EVENT CARDS === */
.event-list{display:flex;flex-direction:column;gap:5px}
.event-card{display:grid;grid-template-columns:68px 1fr auto;gap:16px;align-items:center;background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:16px 20px;transition:border-color 0.3s, transform 0.3s, box-shadow 0.3s}
.event-card:hover{border-color:var(--border);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.date-col{text-align:center}
.date-col .dow{font-size:10px;text-transform:uppercase;color:var(--text-light);font-weight:600;letter-spacing:0.8px}
.date-col .day{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.15;color:var(--accent)}
.date-col .mon{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.ev-info h3{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:5px}
.ev-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.ev-meta .venue{font-weight:500;color:var(--accent)}
.ev-meta .tbadge{background:var(--bg);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;font-variant-numeric:tabular-nums}
.event-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:110px}
.stag{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border-light);padding:4px 10px;border-radius:6px;font-weight:500}
.stag .dot{width:6px;height:6px;border-radius:50%}
.cd{font-size:11px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums}
.cd.past{color:var(--text-light)}

/* === CALENDAR VIEW === */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-head{background:var(--surface);padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.cal-cell{background:var(--white);min-height:90px;padding:6px}
.cal-cell.empty{background:var(--bg)}
.cal-cell .dn{font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:4px}
.cal-cell.today .dn{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;line-height:1.4;cursor:default}
.cal-more{font-size:10px;color:var(--accent);font-weight:600;padding:1px 4px}

/* === FOOTER === */
.footer{text-align:center;margin-top:40px;padding:28px 0;border-top:1px solid var(--border)}
.footer p{font-size:12px;color:var(--text-light);line-height:1.8;font-weight:400}

.empty{text-align:center;padding:60px 20px;color:var(--text-light);font-size:14px}

/* === RESPONSIVE === */
@media(max-width:768px){
  .header-top,.filters,.sources-bar,.content{padding-left:16px;padding-right:16px}
  .brand h1{font-size:22px}
  .event-card{grid-template-columns:54px 1fr;gap:10px}
  .event-right{display:none}
  .cal-cell{min-height:60px;padding:3px}
  .sources-bar .inner{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter-opts{flex-wrap:nowrap;overflow-x:auto}
}

/* === PRINT === */
@media print{
  .filters,.search-wrap,.view-toggle,.sources-bar{display:none!important}
  .header-top{background:var(--header-bg)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .event-card{break-inside:avoid}
}
</style>
</head>

function normalize(ev) {
  if (ev.n) return ev;
  return { n: ev.name || '', d: ev.date || '', t: ev.time || 'TBD', v: ev.venue || '', c: ev.category || 'Community', s: ev.source || '', url: ev.url || '' };
}

async function loadEvents() {
  document.getElementById('c').innerHTML = '<div class="empty"><div style="font-size:28px;margin-bottom:10px">⚓</div>Loading events&hellip;</div>';
  try {
    const res = await fetch('events.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('No events.json found');
    const data = await res.json();
    const scraped = (data.events || []).map(normalize);
    // Merge scraped data with fallback data, then deduplicate
    // This ensures manually-sourced future events (Oct-Dec) aren't lost
    const all = [...scraped, ...FALLBACK_EVENTS];
    const seen = new Set();
    E = all.filter(e => {
      const k = e.n.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,25) + e.d;
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });
    META = data.meta || META;
    const ts = META.lastUpdated ? new Date(META.lastUpdated) : null;
    const badge = document.getElementById('update-badge');
    if (badge && ts) {
      badge.textContent = 'Auto-crawled ' + ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      badge.style.display = 'block';
    }
  } catch (err) {
    E = FALLBACK_EVENTS;
    const badge = document.getElementById('update-badge');
    if (badge) { badge.textContent = 'Using offline data \u2014 last manual crawl Mar 29, 2026'; badge.style.display = 'block'; }
  }
  init();
}

const S={ErieEvents:{l:"Erie Events",d:"#1e40af",bg:"#eff6ff"},FlagshipCity:{l:"Flagship City District",d:"#059669",bg:"#ecfdf5"},VisitErie:{l:"VisitErie",d:"#dc2626",bg:"#fef2f2"},ErieDowntown:{l:"Erie Downtown Partnership",d:"#d97706",bg:"#fffbeb"},ArtMuseum:{l:"Erie Art Museum",d:"#7c3aed",bg:"#f5f3ff"},ChildrensMuseum:{l:"Children\u2019s Museum",d:"#ea580c",bg:"#fff7ed"},CelebrateErie:{l:"CelebrateErie",d:"#db2777",bg:"#fdf2f8"},CityOfErie:{l:"City of Erie",d:"#0891b2",bg:"#ecfeff"},ErieReader:{l:"Erie Reader",d:"#16a34a",bg:"#f0fdf4"}};
const CC={Music:"#1e40af",Sports:"#059669",Festival:"#dc2626",Comedy:"#7c3aed",Theater:"#db2777",Arts:"#ea580c",Community:"#0891b2",Family:"#d97706"};
const CATS=["All","Music","Sports","Festival","Comedy","Theater","Arts","Community","Family"];
const MO=["All","March","April","May","June","July","August","September","October","November","December"];
let F={cat:"All",month:"All",src:"All",q:""},V="list";
const gM=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"long"});
const gMo=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short"});
const gW=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
const gD=d=>new Date(d+"T12:00:00").getDate();
const dU=d=>{const n=new Date(),t=new Date(d+"T12:00:00"),x=Math.ceil((t-n)/864e5);return x===0?"Today":x===1?"Tomorrow":x<0?Math.abs(x)+"d ago":"in "+x+"d"};
const TODAY=new Date().toISOString().slice(0,10);

function gF(){
  let r=E.filter(e=>{
    if(F.cat!=="All"&&e.c!==F.cat)return false;
    if(F.month!=="All"&&gM(e.d)!==F.month)return false;
    if(F.src!=="All"&&e.s!==F.src)return false;
    if(F.q){const q=F.q.toLowerCase();if(!e.n.toLowerCase().includes(q)&&!e.v.toLowerCase().includes(q))return false}
    return true;
  });
  const seen=new Set();
  r=r.filter(e=>{const k=e.n.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,25)+e.d;if(seen.has(k))return false;seen.add(k);return true});
  r.sort((a,b)=>a.d.localeCompare(b.d)||a.t.localeCompare(b.t));
  return r;
}

function rL(items){
  const g={};items.forEach(e=>{const m=gM(e.d);(g[m]=g[m]||[]).push(e)});
  const nx=items.find(e=>e.d>=TODAY);
  let h='';
  if(nx)h+=`<div class="upnext"><span class="upnext-badge">Up Next</span><div class="upnext-info"><h3>${nx.n}</h3><p>${gW(nx.d)}, ${gMo(nx.d)} ${gD(nx.d)} &middot; ${nx.t} &middot; ${nx.v}</p></div><span class="upnext-countdown">${dU(nx.d)}</span></div>`;
  if(!items.length)return h+'<div class="empty">No events match your filters.</div>';
  Object.entries(g).forEach(([m,evts])=>{
    h+=`<div class="month-section"><div class="month-header"><h2>${m}</h2><span class="month-count">${evts.length} event${evts.length>1?"s":""}</span></div><div class="event-list">`;
    evts.forEach(e=>{
      const s=S[e.s]||{l:e.s,d:"#888"};
      const cc=CC[e.c]||"#6b7280";
      const up=e.d>=TODAY;
      h+=`<div class="event-card"><div class="date-col"><div class="mon">${gMo(e.d)}</div><div class="day">${gD(e.d)}</div><div class="dow">${gW(e.d)}</div></div><div class="ev-info"><h3><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cc};margin-right:7px;vertical-align:middle" aria-hidden="true"></span>${e.n}</h3><div class="ev-meta"><span class="tbadge">${e.t}</span><span class="venue">${e.v}</span><span style="color:${cc};font-weight:600;font-size:11px">${e.c}</span></div></div><div class="event-right"><div class="stag"><span class="dot" style="background:${s.d}" aria-hidden="true"></span>${s.l}</div><span class="cd${up?'':' past'}">${dU(e.d)}</span></div></div>`;
    });
    h+='</div></div>';
  });
  return h;
}

function rC(items){
  const bd={};items.forEach(e=>{(bd[e.d]=bd[e.d]||[]).push(e)});
  let mi=F.month!=="All"?MO.indexOf(F.month)+2:3;if(mi<3)mi=3;
  const yr=2026,first=new Date(yr,mi,1),dow=first.getDay(),dim=new Date(yr,mi+1,0).getDate();
  const mn=first.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  let h=`<h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:14px;color:var(--text)">${mn}</h2><div class="cal-grid">`;
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>h+=`<div class="cal-head">${d}</div>`);
  for(let i=0;i<dow;i++)h+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mi+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const today=ds===TODAY;
    const ev=bd[ds]||[];
    h+=`<div class="cal-cell${today?' today':''}"><div class="dn">${d}</div>`;
    ev.slice(0,3).forEach(e=>{const s=S[e.s]||{bg:"rgba(255,255,255,0.05)",d:"#ccc"};h+=`<div class="cal-ev" style="background:${s.bg};color:${s.d}" title="${e.n} \u2014 ${e.t} @ ${e.v}">${e.n}</div>`});
    if(ev.length>3)h+=`<div class="cal-more">+${ev.length-3} more</div>`;
    h+='</div>';
  }
  h+='</div>';return h;
}

function render(){
  const items=gF();
  document.getElementById("tc").textContent=items.length;
  document.getElementById("c").innerHTML=V==="list"?rL(items):rC(items);
  // Update source pills with counts and active state
  const sc={};E.forEach(e=>sc[e.s]=(sc[e.s]||0)+1);
  document.getElementById("sp").innerHTML=Object.entries(S).map(([k,v])=>{
    const isActive=F.src===k;
    return `<span class="src-pill${isActive?' active':''}" data-src="${k}" tabindex="0" role="button" aria-label="Filter by ${v.l}" aria-pressed="${isActive}"><span class="src-dot" style="background:${v.d}" aria-hidden="true"></span>${v.l} <b style="color:${v.d};margin-left:2px">${sc[k]||0}</b></span>`;
  }).join("");
  // Attach click handlers to source pills
  document.querySelectorAll('.src-pill').forEach(pill=>{
    pill.addEventListener('click',()=>{
      const src=pill.dataset.src;
      F.src=F.src===src?'All':src;
      render();
    });
    pill.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){e.preventDefault();pill.click()}
    });
  });
}

function sv(v){V=v;document.querySelectorAll(".vbtn").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".vbtn")[v==="list"?0:1].classList.add("active");render()}

function mf(id,opts,key){
  const el=document.getElementById(id);
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="fbtn"+(F[key]===o?" active":"");
    b.textContent=o;
    b.onclick=()=>{F[key]=o;el.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");render()};
    el.appendChild(b);
  });
}

  mf("cf",CATS,"cat");
